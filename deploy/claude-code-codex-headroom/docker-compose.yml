services:
  # Claude Code talks to Headroom first:
  #   Claude Code -> http://127.0.0.1:8787 -> headroom -> http://sub2api:8080
  # Headroom handles context optimization and caching before forwarding the
  # Anthropic-compatible request to sub2api inside the Docker network.
  headroom:
    build:
      context: .
      dockerfile: Dockerfile.headroom
      target: ${HEADROOM_DOCKER_TARGET:-cpu}
      args:
        HEADROOM_VERSION: ${HEADROOM_VERSION:-0.31.0}
        HEADROOM_PYTHON_VERSION: ${HEADROOM_PYTHON_VERSION:-3.12}
        HEADROOM_GIT_REPO: ${HEADROOM_GIT_REPO:-https://github.com/stgmt/headroom.git}
        HEADROOM_GIT_REF: ${HEADROOM_GIT_REF:-eb8ae8009da5facea3b0cd52f8ab1b1a0616636e}
        HEADROOM_RUST_TOOLCHAIN: ${HEADROOM_RUST_TOOLCHAIN:-1.88.0}
        HEADROOM_TORCH_VERSION: ${HEADROOM_TORCH_VERSION:-2.11.0+cu128}
        HEADROOM_TORCH_INDEX_URL: ${HEADROOM_TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu128}
    image: headroom-sub2api:${HEADROOM_VERSION:-0.31.0}
    container_name: headroom-sub2api
    restart: unless-stopped
    labels:
      org.opencontainers.image.source: ${HEADROOM_GIT_REPO:-https://github.com/stgmt/headroom.git}
      org.opencontainers.image.revision: ${HEADROOM_GIT_REF:-eb8ae8009da5facea3b0cd52f8ab1b1a0616636e}
      stgmt.sub2api.profile: claude-code-codex-headroom
    depends_on:
      sub2api:
        condition: service_healthy
    ports:
      - "${HEADROOM_BIND_HOST:-127.0.0.1}:${HEADROOM_PORT:-8787}:8787"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8787"
      - --mode
      - token
      - --target-ratio
      - "${HEADROOM_TARGET_RATIO:-0.10}"
      - --intercept-tool-results
      - --code-aware
      - --memory
      - --memory-storage
      - project
      - --embedding-server
      - --no-ccr-proactive-expansion
      - --anthropic-api-url
      - http://sub2api:8080
      - --no-subscription-tracking
      - --request-timeout-seconds
      - "${HEADROOM_REQUEST_TIMEOUT_SECONDS:-900}"
      - --anthropic-pre-upstream-concurrency
      - "${HEADROOM_ANTHROPIC_PRE_UPSTREAM_CONCURRENCY:-8}"
      - --compression-max-workers
      - "${HEADROOM_COMPRESSION_MAX_WORKERS:-2}"
      - --log-file
      - /root/.headroom/logs/proxy-requests.jsonl
    environment:
      HEADROOM_TELEMETRY: ${HEADROOM_TELEMETRY:-off}
      HEADROOM_SAVINGS_PROFILE: ${HEADROOM_SAVINGS_PROFILE:-agent-90}
      HEADROOM_MODE: token
      HEADROOM_TARGET_RATIO: ${HEADROOM_TARGET_RATIO:-0.10}
      # Claude windows and subagents share one key/IP bucket in this loopback profile.
      HEADROOM_RPM: ${HEADROOM_RPM:-6000}
      HEADROOM_TPM: ${HEADROOM_TPM:-100000000}
      HEADROOM_FORCE_KOMPRESS: ${HEADROOM_FORCE_KOMPRESS:-1}
      HEADROOM_ACCURACY_GUARD: ${HEADROOM_ACCURACY_GUARD:-strict}
      HEADROOM_CODE_AWARE_ENABLED: ${HEADROOM_CODE_AWARE_ENABLED:-1}
      HEADROOM_CONTEXT_TOOL: ${HEADROOM_CONTEXT_TOOL:-rtk}
      HEADROOM_RTK_GAIN_SCOPE: ${HEADROOM_RTK_GAIN_SCOPE:-global}
      HEADROOM_COMPRESS_USER_MESSAGES: ${HEADROOM_COMPRESS_USER_MESSAGES:-1}
      HEADROOM_COMPRESS_SYSTEM_MESSAGES: ${HEADROOM_COMPRESS_SYSTEM_MESSAGES:-1}
      HEADROOM_PROTECT_ANALYSIS_CONTEXT: ${HEADROOM_PROTECT_ANALYSIS_CONTEXT:-1}
      HEADROOM_PROTECT_READS: ${HEADROOM_PROTECT_READS:-0}
      HEADROOM_PROTECT_RECENT: ${HEADROOM_PROTECT_RECENT:-2}
      HEADROOM_MIN_TOKENS: ${HEADROOM_MIN_TOKENS:-120}
      HEADROOM_MAX_ITEMS: ${HEADROOM_MAX_ITEMS:-8}
      HEADROOM_DEDUPE: ${HEADROOM_DEDUPE:-0}
      HEADROOM_TOOL_SEARCH: ${HEADROOM_TOOL_SEARCH:-0}
      HEADROOM_LOSSLESS_THEN_LOSSY: ${HEADROOM_LOSSLESS_THEN_LOSSY:-0}
      HEADROOM_OUTPUT_SHAPER: ${HEADROOM_OUTPUT_SHAPER:-1}
      HEADROOM_OUTPUT_HOLDOUT: ${HEADROOM_OUTPUT_HOLDOUT:-0}
      HEADROOM_KOMPRESS_EXECUTION_TIMEOUT_MS: ${HEADROOM_KOMPRESS_EXECUTION_TIMEOUT_MS:-60000}
      HEADROOM_COMPRESSION_TIMEOUT_SECONDS: ${HEADROOM_COMPRESSION_TIMEOUT_SECONDS:-120}
      HEADROOM_COMPRESSION_DEADLINE_MS: ${HEADROOM_COMPRESSION_DEADLINE_MS:-90000}
      HEADROOM_MID_TURN_STREAM_WAIT_MS: ${HEADROOM_MID_TURN_STREAM_WAIT_MS:-600000}
      HEADROOM_CLAUDE_CODE_HANDLER_WATCHDOG_MS: ${HEADROOM_CLAUDE_CODE_HANDLER_WATCHDOG_MS:-540000}
      HEADROOM_KOMPRESS_MAX_CONCURRENT: ${HEADROOM_KOMPRESS_MAX_CONCURRENT:-2}
      HEADROOM_KOMPRESS_BACKEND: ${HEADROOM_KOMPRESS_BACKEND:-auto}
      HEADROOM_KOMPRESS_ONNX_INTRA_THREADS: ${HEADROOM_KOMPRESS_ONNX_INTRA_THREADS:-2}
      HEADROOM_KOMPRESS_ONNX_INTER_THREADS: ${HEADROOM_KOMPRESS_ONNX_INTER_THREADS:-1}
      HEADROOM_KOMPRESS_BATCH_SIZE: ${HEADROOM_KOMPRESS_BATCH_SIZE:-16}
    volumes:
      - ${SUB2API_STATE_ROOT:-./data}/headroom:/root/.headroom
      - ${SUB2API_STATE_ROOT:-./data}/headroom-cache:/root/.cache/headroom
      - ${SUB2API_STATE_ROOT:-./data}/headroom-huggingface:/root/.cache/huggingface
      - ${HEADROOM_RTK_STATE_ROOT:-./data/rtk}:/root/.local/share/rtk
    healthcheck:
      test:
        - CMD-SHELL
        - "python - <<'PY'\nimport json, urllib.request\nr=urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5)\nraise SystemExit(0 if json.load(r).get('ready') else 1)\nPY"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - sub2api-network

  sub2api:
    build:
      context: ${SUB2API_BUILD_CONTEXT:-../..}
      dockerfile: ${SUB2API_DOCKERFILE:-Dockerfile}
    image: ${SUB2API_IMAGE:-sub2api-codex:local-token-usage}
    container_name: sub2api-codex
    restart: unless-stopped
    labels:
      org.opencontainers.image.source: ${SUB2API_GIT_REPO:-https://github.com/stgmt/sub2api.git}
      org.opencontainers.image.revision: ${SUB2API_GIT_REF:-local}
      stgmt.sub2api.profile: claude-code-codex-headroom
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Keep the direct port available for admin UI, diagnostics, and non-Claude
    # clients. Claude Code should use Headroom on HEADROOM_PORT instead.
    ports:
      - "${SUB2API_BIND_HOST:-127.0.0.1}:${SUB2API_PORT:-18081}:8080"
    environment:
      AUTO_SETUP: "true"
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_MODE: ${SERVER_MODE:-release}
      RUN_MODE: ${RUN_MODE:-simple}
      SIMPLE_MODE_CONFIRM: ${SIMPLE_MODE_CONFIRM:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
      DATA_DIR: ${DATA_DIR:-/app/data}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-sub2api}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      DATABASE_DBNAME: ${POSTGRES_DB:-sub2api}
      DATABASE_SSLMODE: disable
      DATABASE_MAX_OPEN_CONNS: ${DATABASE_MAX_OPEN_CONNS:-50}
      DATABASE_MAX_IDLE_CONNS: ${DATABASE_MAX_IDLE_CONNS:-10}
      DATABASE_CONN_MAX_LIFETIME_MINUTES: ${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      DATABASE_CONN_MAX_IDLE_TIME_MINUTES: ${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-256}
      REDIS_MIN_IDLE_CONNS: ${REDIS_MIN_IDLE_CONNS:-10}
      REDIS_ENABLE_TLS: ${REDIS_ENABLE_TLS:-false}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRE_HOUR: ${JWT_EXPIRE_HOUR:-24}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:?set TOTP_ENCRYPTION_KEY in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      SECURITY_URL_ALLOWLIST_ENABLED: ${SECURITY_URL_ALLOWLIST_ENABLED:-false}
      SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP: ${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-true}
      SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS: ${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-true}
    volumes:
      - ${SUB2API_STATE_ROOT:-./data}/sub2api:/app/data
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -T
        - "5"
        - -O
        - /dev/null
        - http://localhost:8080/health
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s
    networks:
      - sub2api-network

  postgres:
    image: postgres:18-alpine
    container_name: sub2api-codex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sub2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sub2api}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ${SUB2API_STATE_ROOT:-./data}/postgres:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sub2api-network

  redis:
    image: redis:8-alpine
    container_name: sub2api-codex-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - ${SUB2API_STATE_ROOT:-./data}/redis:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sub2api-network

networks:
  sub2api-network:
    driver: bridge
